services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      APP_URL: http://127.0.0.1:${APP_PORT:-8080}
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      DATABASE_PATH: /app/storage/runtime/benchy.sqlite
      EXPORT_PATH: /app/storage/runtime/exports
      SANDBOX_PATH: /app/storage/runtime/sandbox
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    volumes:
      - benchy_data:/app/storage/runtime

volumes:
  benchy_data:
    driver: local